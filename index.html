<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수능 문해력 100</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #242424;
  --border: #2a2a2a;
  --text: #e8e8e8;
  --text-dim: #888;
  --text-muted: #555;
  --accent: #c8a86e;
  --accent-dim: #a08040;
  --accent-glow: rgba(200,168,110,0.15);
  --green: #6bcf8e;
  --radius: 12px;
  --radius-sm: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
::selection { background: var(--accent); color: var(--bg); }
.container { max-width: 860px; margin: 0 auto; padding: 0 20px; }

/* Header */
header {
  padding: 60px 0 40px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}
header h1 {
  font-family: 'Noto Serif KR', serif;
  font-size: 2.2rem;
  font-weight: 700;
  letter-spacing: -1px;
  margin-bottom: 12px;
}
header h1 span { color: var(--accent); }
header p {
  color: var(--text-dim);
  font-size: 0.95rem;
  font-weight: 300;
}
.stats-bar {
  display: flex;
  justify-content: center;
  gap: 32px;
  margin-top: 24px;
}
.stat { text-align: center; }
.stat-num {
  font-family: 'Noto Serif KR', serif;
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--accent);
}
.stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

/* Search */
.search-wrap {
  margin: 32px 0 24px;
  position: relative;
}
.search-wrap input {
  width: 100%;
  padding: 14px 20px 14px 48px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 0.95rem;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}
.search-wrap input:focus { border-color: var(--accent-dim); }
.search-wrap input::placeholder { color: var(--text-muted); }
.search-icon {
  position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
  color: var(--text-muted); font-size: 1.1rem;
}

/* Progress */
.progress-section { margin: 0 0 32px; }
.progress-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px;
}
.progress-header span { font-size: 0.8rem; color: var(--text-dim); }
.progress-bar {
  height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: var(--accent); border-radius: 2px;
  transition: width 0.4s ease;
}

/* Category cards */
.categories { display: flex; flex-direction: column; gap: 8px; margin-bottom: 40px; }
.cat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.cat-card:hover { border-color: var(--accent-dim); background: var(--surface2); }
.cat-card.active { border-color: var(--accent); background: var(--accent-glow); }
.cat-info h3 {
  font-size: 1.05rem; font-weight: 500; margin-bottom: 4px;
}
.cat-info h3 .cat-num {
  color: var(--accent); font-family: 'Noto Serif KR', serif;
  font-size: 0.85rem; margin-right: 8px;
}
.cat-meta { font-size: 0.78rem; color: var(--text-muted); }
.cat-progress-mini {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.78rem; color: var(--text-dim);
}
.cat-progress-mini .mini-bar {
  width: 48px; height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden;
}
.cat-progress-mini .mini-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.3s; }

/* Sentence view */
.sentence-view { display: none; margin-bottom: 60px; }
.sentence-view.show { display: block; }
.back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--text-dim); font-size: 0.85rem; cursor: pointer;
  margin-bottom: 24px; padding: 8px 0;
  border: none; background: none; font-family: inherit;
  transition: color 0.2s;
}
.back-btn:hover { color: var(--accent); }
.view-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 1.5rem; font-weight: 700;
  margin-bottom: 28px; letter-spacing: -0.5px;
}
.sentence-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
  overflow: hidden;
  transition: border-color 0.2s;
}
.sentence-card:hover { border-color: #333; }
.sentence-header {
  padding: 18px 22px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
}
.sentence-num {
  font-family: 'Noto Serif KR', serif;
  font-size: 0.8rem;
  color: var(--accent);
  min-width: 32px;
  padding-top: 2px;
}
.sentence-text {
  flex: 1;
  font-family: 'Noto Serif KR', serif;
  font-size: 0.95rem;
  line-height: 1.8;
  color: var(--text);
}
.sentence-toggle {
  display: flex; align-items: center; gap: 8px;
  flex-shrink: 0;
}
.check-btn {
  width: 22px; height: 22px;
  border: 2px solid var(--text-muted);
  border-radius: 50%;
  background: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  color: transparent;
  font-size: 0.7rem;
}
.check-btn.checked {
  border-color: var(--green);
  background: var(--green);
  color: var(--bg);
}
.arrow-icon {
  color: var(--text-muted);
  font-size: 0.75rem;
  transition: transform 0.2s;
}
.sentence-card.open .arrow-icon { transform: rotate(180deg); }
.sentence-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease;
}
.sentence-body-inner {
  padding: 0 22px 22px 54px;
}
.section-label {
  font-size: 0.72rem;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin: 18px 0 8px;
  font-weight: 500;
}
.section-label:first-child { margin-top: 0; }
.decompose-item {
  font-size: 0.88rem;
  color: var(--text-dim);
  padding: 3px 0;
  line-height: 1.6;
}
.decompose-item strong { color: var(--text); font-weight: 500; }
.vocab-table {
  width: 100%;
  border-collapse: collapse;
  margin: 4px 0;
}
.vocab-table td {
  padding: 8px 12px;
  font-size: 0.85rem;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
.vocab-table td:first-child {
  color: var(--accent);
  font-weight: 500;
  width: 110px;
  white-space: nowrap;
}
.vocab-table td:last-child { color: var(--text-dim); }
.vocab-table tr:last-child td { border-bottom: none; }
.structure-summary {
  font-size: 0.88rem;
  color: var(--text-dim);
  font-style: italic;
  line-height: 1.6;
}
.tag-list { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
.tag {
  font-size: 0.72rem;
  color: var(--accent);
  border: 1px solid var(--accent-dim);
  border-radius: 20px;
  padding: 2px 10px;
}

/* Search results */
.search-results { margin-bottom: 32px; }
.search-results h3 {
  font-size: 0.85rem; color: var(--text-dim); margin-bottom: 12px;
}
.search-hit {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 18px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color 0.2s;
}
.search-hit:hover { border-color: var(--accent-dim); }
.search-hit .hit-cat { font-size: 0.72rem; color: var(--accent); margin-bottom: 4px; }
.search-hit .hit-word { font-size: 0.95rem; font-weight: 500; margin-bottom: 2px; }
.search-hit .hit-meaning { font-size: 0.82rem; color: var(--text-dim); }
mark { background: var(--accent-glow); color: var(--accent); border-radius: 2px; padding: 0 2px; }

/* Footer */
footer {
  border-top: 1px solid var(--border);
  padding: 32px 0;
  text-align: center;
  font-size: 0.75rem;
  color: var(--text-muted);
}
footer a { color: var(--accent-dim); text-decoration: none; }
footer a:hover { color: var(--accent); }

/* Responsive */
@media (max-width: 600px) {
  header { padding: 40px 0 28px; }
  header h1 { font-size: 1.6rem; }
  .stats-bar { gap: 20px; }
  .stat-num { font-size: 1.4rem; }
  .cat-card { padding: 16px 18px; }
  .sentence-body-inner { padding-left: 22px; }
  .vocab-table td:first-child { width: auto; white-space: normal; }
}
</style>
</head>
<body>

<header>
  <div class="container">
    <h1>수능 <span>문해력</span> 100</h1>
    <p>문장을 통해 개념을 이해하고, 구조를 분해하며 문해력을 훈련하는 시스템</p>
    <div class="stats-bar">
      <div class="stat"><div class="stat-num">189</div><div class="stat-label">어휘</div></div>
      <div class="stat"><div class="stat-num">90</div><div class="stat-label">문장</div></div>
      <div class="stat"><div class="stat-num">10</div><div class="stat-label">범주</div></div>
    </div>
  </div>
</header>

<main class="container">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="어휘 검색 (예: 귀납, 인과, 패러다임)">
  </div>
  <div id="searchResults" class="search-results" style="display:none;"></div>

  <div id="mainView">
    <div class="progress-section">
      <div class="progress-header">
        <span>전체 학습 진행률</span>
        <span id="progressText">0 / 90</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div class="categories" id="catList"></div>
  </div>

  <div class="sentence-view" id="sentenceView">
    <button class="back-btn" id="backBtn">← 범주 목록</button>
    <h2 class="view-title" id="viewTitle"></h2>
    <div id="sentenceList"></div>
  </div>
</main>

<footer>
  <div class="container">
    <p>suneung-literacy-100 · <a href="https://github.com/4sighttt/suneung-literacy-100" target="_blank">GitHub</a></p>
  </div>
</footer>

      {text:"반증주의는 과학 이론이 참임을 증명하는 것은 불가능하지만, 거짓임을 밝히는 것은 가능하다고 본다. 따라서 진정한 과학 이론이란 반증될 가능성에 끊임없이 노출되면서도 아직 반증되지 않은 이론이다.",decompose:[{k:"전제",v:"참의 증명은 불가능, 거짓의 증명은 가능"},{k:"결론",v:"과학 이론 = 반증 가능성에 노출되면서 아직 반증되지 않은 이론"}],vocab:[["반증주의","과학 이론의 자격을 반증 가능성 여부로 판단하는 입장"]],summary:"반증주의의 비대칭 원리를 제시한 뒤, 과학 이론의 재정의로 연결하는 구조",tags:["인식·지식","평가·판단"]},
      {text:"정합성이란 하나의 믿음이 다른 믿음들과 논리적으로 모순 없이 조화를 이루는 성질을 뜻한다. 정합설은 이 성질을 진리의 기준으로 삼아, 믿음들의 체계 전체가 일관되면 그 체계를 참으로 받아들인다. 반면 대응설은 진술이 외부 세계의 사실과 일치하는지를 진리의 기준으로 삼는다.",decompose:[{k:"정의",v:"정합성 = 믿음들이 논리적 모순 없이 조화를 이루는 성질"},{k:"주장 A",v:"정합설: 믿음 체계의 내적 일관성 = 진리 기준"},{k:"주장 B",v:"대응설: 진술과 외부 사실의 일치 = 진리 기준"}],vocab:[["정합성","믿음이나 진술들이 서로 모순 없이 논리적으로 조화를 이루는 성질"],["정합설","믿음 체계의 내적 일관성을 진리 판별의 기준으로 삼는 이론"],["대응설","진술이 외부 사실과 일치하는지를 진리 판별의 기준으로 삼는 이론"]],summary:"정합성을 정의한 뒤, 정합설과 대응설을 진리 기준의 차이로 대립시키는 구조",tags:["인식·지식"]}
    ]
  }
];

// State
let checkedSentences = JSON.parse(localStorage.getItem('sl100_checked') || '{}');
let currentCat = null;

// DOM
const mainView = document.getElementById('mainView');
const sentenceView = document.getElementById('sentenceView');
const catList = document.getElementById('catList');
const sentenceList = document.getElementById('sentenceList');
const viewTitle = document.getElementById('viewTitle');
const backBtn = document.getElementById('backBtn');
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');
const progressFill = document.getElementById('progressFill');
const progressText = document.getElementById('progressText');

function getTotalChecked() {
  return Object.keys(checkedSentences).filter(k => checkedSentences[k]).length;
}
function getTotalSentences() {
  return DATA.reduce((s, c) => s + c.sentences.length, 0);
}
function getCatChecked(catId) {
  return DATA[catId].sentences.filter((_, i) => checkedSentences[catId + '-' + i]).length;
}
function updateProgress() {
  const total = getTotalSentences();
  const checked = getTotalChecked();
  progressFill.style.width = (checked / total * 100) + '%';
  progressText.textContent = checked + ' / ' + total;
}
function saveChecked() {
  localStorage.setItem('sl100_checked', JSON.stringify(checkedSentences));
}

function renderCategories() {
  catList.innerHTML = '';
  DATA.forEach((cat, idx) => {
    const checked = getCatChecked(idx);
    const total = cat.sentences.length;
    const pct = total > 0 ? (checked / total * 100) : 0;
    const div = document.createElement('div');
    div.className = 'cat-card';
    div.innerHTML = `
      <div class="cat-info">
        <h3><span class="cat-num">0${idx + 1}</span>${cat.name}</h3>
        <div class="cat-meta">${cat.count}개 어휘 · ${total}개 문장</div>
      </div>
      <div class="cat-progress-mini">
        <div class="mini-bar"><div class="mini-fill" style="width:${pct}%"></div></div>
        <span>${checked}/${total}</span>
      </div>`;
    div.addEventListener('click', () => showCategory(idx));
    catList.appendChild(div);
  });
}

function showCategory(idx) {
  currentCat = idx;
  mainView.style.display = 'none';
  searchResults.style.display = 'none';
  searchInput.value = '';
  sentenceView.classList.add('show');
  viewTitle.textContent = `0${idx + 1}. ${DATA[idx].name}`;
  renderSentences(idx);
  window.scrollTo(0, 0);
}

function showMain() {
  currentCat = null;
  sentenceView.classList.remove('show');
  mainView.style.display = 'block';
  renderCategories();
  updateProgress();
}

function renderSentences(catIdx) {
  sentenceList.innerHTML = '';
  DATA[catIdx].sentences.forEach((s, i) => {
    const key = catIdx + '-' + i;
    const isChecked = checkedSentences[key];
    const card = document.createElement('div');
    card.className = 'sentence-card';
    card.innerHTML = `
      <div class="sentence-header">
        <span class="sentence-num">${String(i + 1).padStart(2, '0')}</span>
        <div class="sentence-text">${s.text}</div>
        <div class="sentence-toggle">
          <button class="check-btn ${isChecked ? 'checked' : ''}" data-key="${key}">✓</button>
          <span class="arrow-icon">▼</span>
        </div>
      </div>
      <div class="sentence-body">
        <div class="sentence-body-inner">
          <div class="section-label">문장 분해</div>
          ${s.decompose.map(d => `<div class="decompose-item"><strong>${d.k}:</strong> ${d.v}</div>`).join('')}
          <div class="section-label">핵심 개념어</div>
          <table class="vocab-table">${s.vocab.map(v => `<tr><td>${v[0]}</td><td>${v[1]}</td></tr>`).join('')}</table>
          <div class="section-label">구조 요약</div>
          <div class="structure-summary">${s.summary}</div>
          <div class="section-label">포함 범주</div>
          <div class="tag-list">${s.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
        </div>
      </div>`;

    const header = card.querySelector('.sentence-header');
    const body = card.querySelector('.sentence-body');
    const inner = card.querySelector('.sentence-body-inner');
    header.addEventListener('click', (e) => {
      if (e.target.closest('.check-btn')) return;
      card.classList.toggle('open');
      if (card.classList.contains('open')) {
        body.style.maxHeight = inner.scrollHeight + 40 + 'px';
      } else {
        body.style.maxHeight = '0';
      }
    });

    const checkBtn = card.querySelector('.check-btn');
    checkBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const k = checkBtn.dataset.key;
      checkedSentences[k] = !checkedSentences[k];
      checkBtn.classList.toggle('checked');
      saveChecked();
      updateProgress();
    });

    sentenceList.appendChild(card);
  });
}

// Search
function buildVocabIndex() {
  const index = [];
  DATA.forEach((cat, ci) => {
    cat.sentences.forEach((s, si) => {
      s.vocab.forEach(v => {
        index.push({ word: v[0], meaning: v[1], catName: cat.name, catIdx: ci, sentIdx: si });
      });
    });
  });
  return index;
}
const vocabIndex = buildVocabIndex();

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (!q) {
    searchResults.style.display = 'none';
    mainView.style.display = currentCat === null ? 'block' : 'none';
    return;
  }
  const hits = vocabIndex.filter(v => v.word.toLowerCase().includes(q) || v.meaning.toLowerCase().includes(q));
  if (hits.length === 0) {
    searchResults.style.display = 'block';
    searchResults.innerHTML = '<h3>검색 결과 없음</h3>';
    mainView.style.display = 'none';
    sentenceView.classList.remove('show');
    return;
  }
  const seen = new Set();
  const unique = hits.filter(h => {
    const k = h.word + h.catIdx;
    if (seen.has(k)) return false;
    seen.add(k);
    return true;
  });
  searchResults.style.display = 'block';
  mainView.style.display = 'none';
  sentenceView.classList.remove('show');
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  searchResults.innerHTML = `<h3>${unique.length}개 결과</h3>` +
    unique.map(h => `
      <div class="search-hit" data-cat="${h.catIdx}" data-sent="${h.sentIdx}">
        <div class="hit-cat">${h.catName}</div>
        <div class="hit-word">${h.word.replace(re, '<mark>$1</mark>')}</div>
        <div class="hit-meaning">${h.meaning.replace(re, '<mark>$1</mark>')}</div>
      </div>`).join('');

  searchResults.querySelectorAll('.search-hit').forEach(el => {
    el.addEventListener('click', () => {
      const ci = parseInt(el.dataset.cat);
      const si = parseInt(el.dataset.sent);
      showCategory(ci);
      setTimeout(() => {
        const cards = sentenceList.querySelectorAll('.sentence-card');
        if (cards[si]) {
          cards[si].classList.add('open');
          const body = cards[si].querySelector('.sentence-body');
          const inner = cards[si].querySelector('.sentence-body-inner');
          body.style.maxHeight = inner.scrollHeight + 40 + 'px';
          cards[si].scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }, 100);
    });
  });
});

backBtn.addEventListener('click', showMain);

// Init
renderCategories();
updateProgress();
</script>
</body>
</html>
